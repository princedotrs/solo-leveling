name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or branch to build (e.g. v0.1.0 or main)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS
        id: eas
        run: |
          set -euo pipefail
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            --wait > build.json
          cat build.json
          APK_URL=$(jq -r '.[0].artifacts.buildUrl' build.json)
          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "Could not resolve APK URL from EAS output."
            exit 1
          fi
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"

      - name: Determine release tag
        id: tag
        run: |
          REF="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.ref }}" ]]; then
            REF="${{ inputs.ref }}"
          fi
          echo "tag=$REF" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          curl -L -o "solo-leveling-${{ steps.tag.outputs.tag }}.apk" "${{ steps.eas.outputs.apk_url }}"
          ls -lh solo-leveling-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: solo-leveling-${{ steps.tag.outputs.tag }}.apk
          name: Solo Leveling ${{ steps.tag.outputs.tag }}
          generate_release_notes: true

      - name: Upload APK artifact (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: solo-leveling-apk
          path: solo-leveling-*.apk
